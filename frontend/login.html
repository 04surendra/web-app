<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login - ShiftCart</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0;}
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #0066cc; color: white; border: none; width: 100%; padding: 10px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p style="font-size:0.9em; text-align:center;">New here? <a href="register.html">Register</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
