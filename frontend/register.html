<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Register - ShiftCart</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0;}
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #cc0000; color: white; border: none; width: 100%; padding: 10px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>
    <div class="box">
        <h2>Create Account</h2>
        <form id="regForm">
            <input type="email" id="regEmail" placeholder="Email Address" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p style="font-size:0.9em; text-align:center;">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
