<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud E-Commerce Store</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        header { background: #cc0000; color: white; padding: 15px; text-align: center; border-radius: 5px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; justify-content: center; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .price { color: #e67e22; font-weight: bold; font-size: 1.2em; }
        .btn { background: #0066cc; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #004b99; }
    </style>
</head>
<body>

    <header>
        <h1>ShiftCart E-Commerce</h1>
        <p>Deployed seamlessly on OpenShift</p>
    </header>

    <div class="container" id="products-container">
        </div>

    <script src="script.js"></script>
</body>
</html>
